<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Search Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="launcher-container">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search, index, or ask..." autofocus autocomplete="off" spellcheck="false">
      <button id="indexFolderBtn" title="Index a folder">📁</button>
      <div id="loadingIndicator" class="hidden">Wait...</div>
    </div>

    <div class="search-filters">
        <div class="filter-chip active" data-type="all">All</div>
        <div class="filter-chip" data-type="text">Text</div>
        <div class="filter-chip" data-type="image">Images</div>
        <div class="filter-chip" data-type="video">Videos</div>
        <div class="filter-chip" data-type="audio">Audio</div>
    </div>
    
    <div id="indexingOverlay" class="hidden">
      <div class="indexing-header">
        <span id="indexingFile">Indexing...</span>
        <span id="indexingETA">ETA: --</span>
      </div>
      <div class="progress-bar-container large">
        <div class="progress-bar" id="indexingProgressBar" style="width: 0%"></div>
      </div>
      <div class="indexing-footer">
        <span id="indexingCount">0 / 0</span>
        <span id="indexingPercent">0%</span>
      </div>
    </div>

    <div id="resultsContainer" class="hidden">
      <!-- Results populated here -->
    </div>
    
    <div class="footer">
      <div class="limit-indicator">
        <span id="planText">Memory Usage</span>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        <span id="usageText">0%</span>
      </div>
      <button id="clearIndexBtn" title="Clear All Data">🗑️ Clear All</button>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
